<section class="user-section">
  <header class="user-header">
    <h2>Registration List</h2>
  </header>

  <div *ngIf="loading" class="user-loading">
    <div class="spinner-grow text-primary" role="status"></div>
    <span>Fetching registration data...</span>
  </div>

  <div *ngIf="error" class="user-error">
    {{ error }}
  </div>

  <ng-container *ngIf="!loading && !error">
    <div *ngIf="registrations.length > 0" class="registration-cards">
      <div *ngFor="let reg of registrations" class="registration-card">
        <div class="card-body">
          <h5 class="card-title">{{ reg.name }}</h5>
          <h6 class="card-subtitle mb-2 text-muted">ID: {{ reg.id }}</h6>
          <p class="card-text">
            <strong>Email:</strong> <a href="mailto:{{ reg.email }}">{{ reg.email }}</a><br>
            <strong>Location:</strong> {{ reg.location }}<br>
            <strong>Course:</strong> {{ reg.course }}
          </p>
        </div>
      </div>
    </div>
    <div *ngIf="registrations.length === 0" class="no-data">
      <img src="/assets/no-data.svg" alt="No data" style="width:80px; margin-bottom: 12px;" />
      <p>No registered users found.</p>
    </div>
  </ng-container>
 </section>
