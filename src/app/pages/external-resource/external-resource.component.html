<div class="external-resource-container">
	<div *ngIf="loading" class="text-center my-4">
		<div class="spinner-border text-primary" role="status">
			<span class="visually-hidden">Loading...</span>
		</div>
	</div>
	<div *ngIf="error" class="alert alert-danger">{{ error }}</div>
	<div class="row g-3" *ngIf="!loading && !error">
		<div class="col-12 col-md-6 col-lg-4" *ngFor="let comment of comments">
			<div class="card comment-card h-100">
				<div class="card-body">
					<h5 class="card-title mb-1">{{ comment.name }}</h5>
					<h6 class="card-subtitle mb-2 text-muted">{{ comment.email }}</h6>
					<p class="card-text">{{ comment.body }}</p>
				</div>
				<div class="card-footer text-end bg-white border-0">
					<span class="badge bg-primary">ID: {{ comment.id }}</span>
				</div>
			</div>
		</div>
	</div>
</div>
