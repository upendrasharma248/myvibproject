<section>
  <h2>Photo Gallery</h2>
  <div class="row g-3 mt-3">
    <div class="col-6 col-md-4 col-lg-3" *ngFor="let img of [1,2,3,4,5,6,7,8]">
      <div class="card">
        <img [src]="'https://picsum.photos/seed/lvc' + img + '/300/200'" class="card-img-top" alt="Gallery image">
      </div>
    </div>
  </div>
</section>
