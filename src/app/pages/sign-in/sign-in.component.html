<div class="signin-container">
	<h2 class="mb-4">Sign In</h2>
	<form [formGroup]="signInForm" (ngSubmit)="onSubmit()" novalidate>
		<div class="mb-3">
			<label for="email" class="form-label">Email</label>
			<input type="email" id="email" class="form-control" formControlName="email" placeholder="Enter your email"
				[ngClass]="{'is-invalid': (submitted || signInForm.get('email')?.touched) && signInForm.get('email')?.invalid}">
			<div class="invalid-feedback d-block" *ngIf="(submitted || signInForm.get('email')?.touched) && signInForm.get('email')?.errors?.['required']">
				Email is required.
			</div>
			<div class="invalid-feedback d-block" *ngIf="(submitted || signInForm.get('email')?.touched) && signInForm.get('email')?.errors?.['email']">
				Please enter a valid email address.
			</div>
		</div>
		<div class="mb-3">
			<label for="password" class="form-label">Password</label>
			<div class="input-group">
				<input [type]="showPassword ? 'text' : 'password'" id="password" class="form-control" formControlName="password" placeholder="Enter your password"
					[ngClass]="{'is-invalid': (submitted || signInForm.get('password')?.touched) && signInForm.get('password')?.invalid}">
				<button type="button" class="btn btn-outline-secondary" (click)="showPassword = !showPassword" tabindex="-1">
					{{ showPassword ? 'Hide' : 'Show' }}
				</button>
			</div>
			<div class="invalid-feedback d-block" *ngIf="(submitted || signInForm.get('password')?.touched) && signInForm.get('password')?.errors?.['required']">
				Password is required.
			</div>
			<div class="invalid-feedback d-block" *ngIf="(submitted || signInForm.get('password')?.touched) && signInForm.get('password')?.errors?.['minlength']">
				Password must be at least 6 characters.
			</div>
		</div>
		<button type="submit" class="btn btn-danger w-100" [disabled]="signInForm.invalid || loading">
			{{ loading ? 'Signing In...' : 'Sign In' }}
		</button>
		<div *ngIf="submitted && signInForm.valid" class="alert alert-success mt-3">Sign in successful!</div>
	</form>
</div>
