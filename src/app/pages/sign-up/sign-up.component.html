<div class="signup-container">
	<h2 class="mb-4">Sign Up</h2>
	<form [formGroup]="signUpForm" (ngSubmit)="onSubmit()" novalidate>
		<div class="mb-3">
			<label for="name" class="form-label">Name</label>
			<input type="text" id="name" class="form-control" formControlName="name" placeholder="Enter your name"
				[ngClass]="{'is-invalid': (submitted || signUpForm.get('name')?.touched) && signUpForm.get('name')?.invalid}">
			<div class="invalid-feedback d-block" *ngIf="(submitted || signUpForm.get('name')?.touched) && signUpForm.get('name')?.errors?.['required']">
				Name is required.
			</div>
		</div>
		<div class="mb-3">
			<label for="email" class="form-label">Email</label>
			<input type="email" id="email" class="form-control" formControlName="email" placeholder="Enter your email"
				[ngClass]="{'is-invalid': (submitted || signUpForm.get('email')?.touched) && signUpForm.get('email')?.invalid}">
			<div class="invalid-feedback d-block" *ngIf="(submitted || signUpForm.get('email')?.touched) && signUpForm.get('email')?.errors?.['required']">
				Email is required.
			</div>
			<div class="invalid-feedback d-block" *ngIf="(submitted || signUpForm.get('email')?.touched) && signUpForm.get('email')?.errors?.['email']">
				Please enter a valid email address.
			</div>
		</div>
		<div class="mb-3">
			<label for="password" class="form-label">Password</label>
			<input type="password" id="password" class="form-control" formControlName="password" placeholder="Enter your password"
				[ngClass]="{'is-invalid': (submitted || signUpForm.get('password')?.touched) && signUpForm.get('password')?.invalid}">
			<div class="invalid-feedback d-block" *ngIf="(submitted || signUpForm.get('password')?.touched) && signUpForm.get('password')?.errors?.['required']">
				Password is required.
			</div>
			<div class="invalid-feedback d-block" *ngIf="(submitted || signUpForm.get('password')?.touched) && signUpForm.get('password')?.errors?.['minlength']">
				Password must be at least 8 characters.
			</div>
			<div class="invalid-feedback d-block" *ngIf="(submitted || signUpForm.get('password')?.touched) && signUpForm.get('password')?.errors?.['passwordStrength']">
				Password must contain uppercase, lowercase, number, and special character.
			</div>
		</div>
		<button type="submit" class="btn btn-primary w-100" [disabled]="signUpForm.invalid">Sign Up</button>

		<div *ngIf="errorMsg" class="alert alert-danger mt-3">{{ errorMsg }}</div>
		<div *ngIf="successMsg" class="alert alert-success mt-3">{{ successMsg }}</div>
	</form>
</div>
